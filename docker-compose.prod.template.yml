# Production Template - Fill with your actual values
# Copy to docker-compose.prod.yml and fill passwords

version: '3.9'

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}  # CHANGE THIS
    ports: []  # Don't expose DB port in production

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports: []  # Don't expose Redis port in production

  elasticsearch:
    restart: always
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}  # CHANGE THIS
    ports: []  # Don't expose ES port in production

  minio:
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}  # CHANGE THIS
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}  # CHANGE THIS
    ports: []  # Serve via Nginx

  api:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    restart: always
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d/prod:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"